<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>METTOT</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
<style>
body{background:#050505;color:#fff;font-family:Inter,sans-serif}
.glass{background:rgba(18,18,18,.75);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.08)}
</style>
</head>
<body class="p-6 max-w-6xl mx-auto">
<h1 class="text-5xl font-black mb-8">METTOT</h1>

<section class="glass rounded-2xl p-6 mb-8">
<h2 class="text-2xl font-bold mb-3">HAKKIMDA</h2>
<p>Çocukluk düşlerinden ilham alan melankolik hip-hop sanatçısı. Gerçek duyguları, ham sözleri ve özgün sound'u ile yeni nesil hip-hop sahnesinde kendi yolunu çiziyor.</p>
</section>

<section class="glass rounded-2xl p-6 mb-10">
<h2 class="text-2xl font-bold mb-3">İLETİŞİM</h2>
<p><i class="fa-regular fa-envelope text-emerald-400"></i> enesjordanmarashi@gmail.com</p>
<p><i class="fa-brands fa-instagram text-emerald-400"></i> @enessjordan</p>
</section>

<h2 class="text-4xl font-black mb-6">DİSKOGRAFİ</h2>
<div id="diskography" class="grid md:grid-cols-2 gap-6"></div>

<script>
const songs=[
{title:"Zarı Yuvarla",type:"Albüm",year:"2026",cover:"zariyuvarla.jpg",link:"https://open.spotify.com/track/2TKln43n9wlO5aIxkephHN?si=4UaqkQ9LQs64EsQxcygl-w&utm_source=copy-link"},
{title:"İstediğin Olsun",type:"Single",year:"2025",cover:"gecemesaisi.jpg",link:"https://open.spotify.com/track/1Gft7Mw39rPwFQI3qJrgYy?si=HAoriitiTsasi-LpNdjuDQ&utm_source=copy-link"},
{title:"Suistimal",type:"Single",year:"2025",cover:"suistimal.jpg",link:"https://open.spotify.com/track/3gh04cDOFyUqZGJiQdHEsy?si=xGbN9bOVR_KTUuT9kAI6VA&utm_source=copy-link"},
{title:"Unutmadım",type:"Single",year:"2025",cover:"unutmadim.png",link:"https://open.spotify.com/track/0POjGkSC3zLCIoos8G0eEd?si=3wxnX91QTu-30usP_NEE2g&utm_source=copy-link"}
];

document.getElementById("diskography").innerHTML=songs.map(s=>`
<a href="${s.link}" target="_blank" class="glass rounded-2xl p-4 flex gap-4 hover:border-emerald-400">
<img src="${s.cover}" class="w-24 h-24 rounded-xl object-cover" alt="${s.title}">
<div>
<h3 class="font-bold text-xl">${s.title}</h3>
<p class="text-gray-400">${s.type} • ${s.year}</p>
</div>
</a>`).join("");
</script>
</body>
</html>
