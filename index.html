<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>METTOT | Resmi Web Sitesi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0b0f19; }
        .text-glow { text-shadow: 0 0 15px rgba(255, 255, 255, 0.15); }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: rgba(255, 255, 255, 0.02); }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 2px; }
    </style>
</head>
<body class="text-gray-100 min-h-screen flex flex-col justify-between selection:bg-emerald-500 selection:text-black">

    <audio id="main-audio"></audio>

    <header class="relative w-full h-[35vh] overflow-hidden">
        <div class="absolute inset-0 bg-cover bg-center" style="background-image: url('background.jpg');">
            <div class="absolute inset-0 bg-gradient-to-t from-[#0b0f19] via-transparent to-black/40"></div>
            <div class="absolute inset-0 bg-gradient-to-r from-[#0b0f19]/90 via-[#0b0f19]/40 to-transparent"></div>
        </div>
        <div class="absolute bottom-6 left-6 md:left-12 flex items-center space-x-2 bg-black/50 backdrop-blur-md px-4 py-2 rounded-full border border-white/10 text-xs text-emerald-400">
            <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
            <span>Yeni Albüm "Zarı Yuvarla" Yayında</span>
        </div>
    </header>

    <main class="max-w-7xl w-full mx-auto px-4 md:px-8 py-8 flex-grow grid grid-cols-1 lg:grid-cols-12 gap-8 items-start">
        <section class="lg:col-span-7 xl:col-span-8 space-y-8">
            <div>
                <h1 class="text-6xl md:text-8xl font-black tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-white via-gray-200 to-gray-500 font-display text-glow">METTOT</h1>
                <p class="text-lg md:text-xl font-light text-gray-400 italic tracking-wider mt-1 border-l-2 border-emerald-500 pl-3">el sueno del nino</p>
            </div>

            <div class="flex flex-wrap gap-4">
                <a href="#" class="flex items-center space-x-3 bg-[#1DB954] hover:bg-[#1ed760] text-black font-semibold px-6 py-3 rounded-full transition-all">Spotify</a>
                <a href="#" class="flex items-center space-x-3 bg-[#FF0000] hover:bg-[#ff1a1a] text-white font-semibold px-6 py-3 rounded-full transition-all">YouTube</a>
            </div>

            <div class="bg-white/5 backdrop-blur-md rounded-2xl p-6 border border-white/10 shadow-xl">
                <div class="flex flex-col sm:flex-row items-center space-y-4 sm:space-y-0 sm:space-x-6">
                    <div class="relative w-24 h-24 rounded-lg overflow-hidden flex-shrink-0 bg-slate-800">
                        <img id="player-cover" src="zariyuvarla.jpg" class="w-full h-full object-cover">
                    </div>
                    <div class="flex-grow w-full space-y-3">
                        <div class="flex justify-between items-start">
                            <div>
                                <h3 class="font-bold text-lg text-white" id="current-title">Zarı Yuvarla</h3>
                                <p class="text-sm text-gray-400" id="player-artist">METTOT</p>
                            </div>
                            <span id="playing-badge" class="text-[10px] bg-emerald-500/10 text-emerald-400 px-2.5 py-1 rounded-full border border-emerald-500/20 font-bold uppercase opacity-0 transition-opacity">MÜZİK ÇALIYOR</span>
                        </div>
                        <div class="relative h-1.5 w-full bg-white/10 rounded-full cursor-pointer" id="progress-container">
                            <div class="absolute h-full bg-emerald-500 rounded-full" id="progress-bar" style="width: 0%"></div>
                        </div>
                        <div class="flex items-center space-x-6">
                            <button onclick="prevTrack()" class="text-gray-400 hover:text-white">Geri</button>
                            <button onclick="togglePlay()" class="w-12 h-12 rounded-full bg-white text-black flex items-center justify-center">
                                <span id="play-btn-text">PLAY</span>
                            </button>
                            <button onclick="nextTrack()" class="text-gray-400 hover:text-white">İleri</button>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script>
        const playlist = [
            { title: "Zarı Yuvarla", url: "Zarı Yuvarla.mp4", cover: "zariyuvarla.jpg" },
            { title: "İstediğin olsun", url: "İstediğin olsun.mp4", cover: "istediğinolsun.jpg" },
            { title: "Suistimal", url: "Suistimal.mp4", cover: "suistimal.jpg" },
            { title: "Unutmadım", url: "Unutmadım.mp4", cover: "unutmadım.jpg" }
        ];

        let currentIdx = 0;
        const audio = document.getElementById('main-audio');
        const badge = document.getElementById('playing-badge');
        const progressBar = document.getElementById('progress-bar');
        const playBtnText = document.getElementById('play-btn-text');

        function loadTrack(i) {
            currentIdx = i;
            audio.src = playlist[i].url;
            document.getElementById('current-title').innerText = playlist[i].title;
            document.getElementById('player-cover').src = playlist[i].cover;
        }

        function togglePlay() {
            if (audio.paused) { 
                audio.play(); 
                playBtnText.innerText = "PAUSE"; 
                badge.classList.remove('opacity-0'); 
            } else { 
                audio.pause(); 
                playBtnText.innerText = "PLAY"; 
                badge.classList.add('opacity-0'); 
            }
        }

        function nextTrack() {
            currentIdx = (currentIdx + 1) % playlist.length;
            loadTrack(currentIdx);
            audio.play();
            playBtnText.innerText = "PAUSE";
            badge.classList.remove('opacity-0');
        }

        function prevTrack() {
            currentIdx = (currentIdx - 1 + playlist.length) % playlist.length;
            loadTrack(currentIdx);
            audio.play();
            playBtnText.innerText = "PAUSE";
            badge.classList.remove('opacity-0');
        }

        audio.ontimeupdate = () => {
            progressBar.style.width = ((audio.currentTime / audio.duration) * 100) + "%";
        };

        audio.onended = nextTrack;

        document.getElementById('progress-container').onclick = (e) => {
            audio.currentTime = (e.offsetX / e.target.offsetWidth) * audio.duration;
        };
    </script>
</body>
</html>
