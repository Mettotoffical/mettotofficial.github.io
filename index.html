<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>METTOT | Resmi Web Sitesi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&family=Cormorant+Garamond:ital,wght@0,400;1,400&display=swap');
        body { background-color: #050505; color: white; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .glass { background: rgba(18, 18, 18, 0.7); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .cormorant { font-family: 'Cormorant Garamond', serif; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
    </style>
</head>
<body class="min-h-screen">

    <main class="p-6 lg:p-12 max-w-[1850px] mx-auto relative">
        <section class="grid grid-cols-1 lg:grid-cols-12 gap-16 relative overflow-hidden">
            <div class="absolute inset-0 z-0">
                <img src="background.jpg" class="w-full h-full object-cover object-[72%_3%] opacity-25" alt="Background">
                <div class="absolute inset-0 bg-black/55"></div>
            </div>

            <div class="relative z-10 lg:col-span-8">
                <h2 class="text-[120px] font-black leading-none tracking-tighter mb-4">METTOT</h2>
                <p class="cormorant italic text-[#67d6b8] text-5xl mb-12">El Sueño del Niño</p>

                <div class="glass p-8 rounded-3xl w-full">
                    <p class="text-sm text-[#67d6b8] font-bold uppercase mb-4">ŞU AN ÇALINIYOR</p>
                    <div class="flex items-center gap-6">
                        <img id="current-cover" src="zariyuvarla.jpg" class="rounded-xl w-[100px] h-[100px] object-cover" alt="Album Art">
                        <div class="flex-1">
                            <h3 id="current-title" class="text-2xl font-bold">Zarı Yuvarla</h3>
                            <div class="w-full bg-gray-700 h-2 rounded-full mt-4">
                                <div id="progress-bar" class="bg-[#67d6b8] h-2 rounded-full w-0"></div>
                            </div>
                        </div>
                    </div>
                    <div class="flex justify-center mt-8 gap-10 text-3xl">
                        <button onclick="prevTrack()"><i class="fa-solid fa-backward-step"></i></button>
                        <button onclick="togglePlay()"><i id="play-pause-icon" class="fa-solid fa-circle-play text-5xl"></i></button>
                        <button onclick="nextTrack()"><i class="fa-solid fa-forward-step"></i></button>
                    </div>
                </div>
            </div>

            <div class="relative z-10 lg:col-span-4 flex flex-col gap-6">
                <div class="glass p-8 rounded-2xl">
                    <h3 class="text-3xl font-bold">4 Resmî Yayın</h3>
                </div>
            </div>
        </section>

        <section class="mt-24">
            <h2 class="text-3xl font-bold mb-10">DİSKOGRAFİ</h2>
            <div id="diskography-grid" class="grid grid-cols-1 md:grid-cols-2 gap-8"></div>
        </section>
    </main>

    <audio id="audio-player"></audio>

    <script>
        const playlist = [
            { title: "Zarı Yuvarla", cover: "zariyuvarla.jpg", url: "zariyuvarla.mp4" },
            { title: "İstediğin Olsun", cover: "gecemesaisi.jpg", url: "olsun.mp4" },
            { title: "Suistimal", cover: "suistimal.jpg", url: "Suistimal.mp4" },
            { title: "Unutmadım", cover: "unutmadim.png", url: "Unutmadim.mp4" }
        ];

        let index = 0;
        const audio = document.getElementById('audio-player');
        const playIcon = document.getElementById('play-pause-icon');

        function loadTrack(i) {
            index = i;
            audio.src = playlist[i].url;
            document.getElementById('current-title').innerText = playlist[i].title;
            document.getElementById('current-cover').src = playlist[i].cover;
        }

        function togglePlay() {
            if (audio.paused) {
                audio.play();
                playIcon.className = "fa-solid fa-circle-pause text-5xl";
            } else {
                audio.pause();
                playIcon.className = "fa-solid fa-circle-play text-5xl";
            }
        }

        function nextTrack() {
            index = (index + 1) % playlist.length;
            loadTrack(index);
            audio.play();
        }

        function prevTrack() {
            index = (index - 1 + playlist.length) % playlist.length;
            loadTrack(index);
            audio.play();
        }

        audio.addEventListener('timeupdate', () => {
            const progress = (audio.currentTime / audio.duration) * 100;
            document.getElementById('progress-bar').style.width = progress + "%";
        });

        audio.addEventListener('ended', nextTrack);

        const grid = document.getElementById('diskography-grid');
        playlist.forEach((track, i) => {
            const card = document.createElement('div');
            card.className = "glass p-4 rounded-2xl flex items-center gap-6 cursor-pointer";
            card.innerHTML = `<img src="${track.cover}" class="w-[100px] h-[100px] rounded-lg object-cover"> <div><p class="font-bold">${track.title}</p></div>`;
            card.onclick = () => { loadTrack(i); audio.play(); playIcon.className = "fa-solid fa-circle-pause text-5xl"; };
            grid.appendChild(card);
        });

        loadTrack(0);
    </script>
</body>
</html>
