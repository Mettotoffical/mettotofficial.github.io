@{
    Layout = null;
}

<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>METTOT — Official</title>

    <style>

            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
                font-family: Arial, Helvetica, sans-serif;
            }

            html {
                scroll-behavior: smooth;
            }

            body {
                background: linear-gradient( rgba(0,0,0,.55), rgba(0,0,0,.85)), url('background.jpg');
                background-size: cover;
                background-position: center 15%;
             
                color: white;
                overflow-x: hidden;
            }

            /* Menü */

            nav {
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                padding: 25px 60px;
                display: flex;
                justify-content: space-between;
                align-items: center;
                background: rgba(0,0,0,.55);
                backdrop-filter: blur(10px);
                z-index: 9999;
            }

            .logo {
                font-size: 42px;
                font-weight: 900;
                letter-spacing: 3px;
            }

            .menu a {
                color: white;
                text-decoration: none;
                margin-left: 35px;
                font-size: 18px;
                font-weight: 700;
                letter-spacing: 1px;
                transition: .3s;
            }

                .menu a:hover {
                    opacity: .6;
                }

            /* Hero */

            .hero {
                height: 100vh;
                background: transparent;
                display: flex;
                align-items: center;
                padding-left: 120px;
            }

            .hero-content h1 {
                font-size: 120px;
                font-weight: 900;
                line-height: 1;
                text-shadow: 0 0 30px rgba(255,255,255,.2);
            }

            .hero-content p {
                font-size: 28px;
                letter-spacing: 4px;
                margin-top: 15px;
                opacity: .9;
            }

            /* Albümler */

            .albumler {
                padding: 120px 70px;
                background: transparent;
            }

                .albumler h2 {
                    font-size: 60px;
                    margin-bottom: 50px;
                    font-weight: 900;
                }

            .grid {
                display: grid;
                grid-template-columns: repeat(3,1fr);
                gap: 30px;
            }

            .kart {
                position: relative;
                height: 450px;
                overflow: hidden;
                border-radius: 20px;
                cursor: pointer;
                transition: .4s;
                border: 1px solid rgba(255,255,255,.15);
                text-decoration: none;
                color: white;
                display: block;
            }

                .kart:hover {
                    transform: translateY(-10px);
                }

                .kart img {
                    width: 100%;
                    height: 100%;
                    object-fit: cover;
                    transition: .5s;
                }

                .kart:hover img {
                    transform: scale(1.08);
                }

                .kart::after {
                    content: "";
                    position: absolute;
                    left: 0;
                    bottom: 0;
                    width: 100%;
                    height: 60%;
                    background: linear-gradient( transparent, rgba(0,0,0,.95));
                }

            .kart-yazi {
                position: absolute;
                bottom: 25px;
                left: 25px;
                z-index: 5;
            }

                .kart-yazi h3 {
                    font-size: 36px;
                    font-weight: 900;
                    margin-bottom: 5px;
                }

                .kart-yazi p {
                    font-size: 14px;
                    letter-spacing: 2px;
                    opacity: .8;
                }

            .iletisim {
                font-size: 22px;
                line-height: 60px;
            }

                .iletisim a {
                    color: white;
                    text-decoration: none;
                    font-weight: 700;
                }

                    .iletisim a:hover {
                        opacity: .7;
                    }
            /* Footer */

            footer {
                padding: 50px;
                text-align: center;
                background: black;
                border-top: 1px solid rgba(255,255,255,.08);
            }

                footer p {
                    opacity: .7;
                }

            /* Mobil */

            @media (max-width:900px) {

    nav{
        flex-direction:column;
        padding:15px;
        gap:15px;
    }

    .logo{
        font-size:24px;
    }

    .menu{
        display:flex;
        flex-wrap:wrap;
        justify-content:center;
        gap:15px;
    }

    .menu a{
        margin-left:0;
        font-size:16px;
    }

    .hero{
        height:auto;
        min-height:100vh;
        padding:180px 20px 80px;
        justify-content:center;
        text-align:center;
    }

    .hero-content h1{
        font-size:60px;
    }

    .hero-content p{
        font-size:20px;
        letter-spacing:2px;
    }

    .albumler{
        padding:80px 20px;
    }

    .albumler h2{
        font-size:48px;
        text-align:center;
    }

    .grid{
        grid-template-columns:1fr;
    }

    .kart{
        height:350px;
    }

    .kart-yazi h3{
        font-size:28px;
    }

    .iletisim{
        font-size:18px;
        line-height:40px;
        text-align:center;
    }
}
